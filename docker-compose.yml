version: "3"
services:
  kaifusion-be:
    build: .
    image: kaifusion:latest
    container_name: kai-fusion-backend
    ports:
      - "${BACKEND_PORT:-23056}:8000"
    environment:
      # Core Application Settings
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      BACKEND_PORT: ${BACKEND_PORT:-23056}
      BACKEND_DEBUG: ${BACKEND_DEBUG:-true}
      ROOT_PATH: ${ROOT_PATH}

      # Database Settings
      CREATE_DATABASE: ${CREATE_DATABASE}
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_SSL: ${DATABASE_SSL}
      DISABLE_DATABASE: ${DISABLE_DATABASE}

      # Security
      MASTER_API_KEY: ${MASTER_API_KEY}
      CREDENTIAL_MASTER_KEY: ${CREDENTIAL_MASTER_KEY}

      # Basic Settings
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}

      # LangSmith Settings
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2}
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT}

      # Keycloak Settings
      KEYCLOAK_ENABLED: ${KEYCLOAK_ENABLED:-false}
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_VERIFY_SSL: ${KEYCLOAK_VERIFY_SSL}      

    command: uvicorn main:app --host 0.0.0.0 --port 8000
    networks:
      - kai_network
    stdin_open: true
    restart: always
    tty: true

  kaifusion-fe:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_API_VERSION: ${VITE_API_VERSION}
        VITE_BASE_PATH: ${VITE_BASE_PATH}
        VITE_NODE_ENV: ${VITE_NODE_ENV}
        VITE_ENABLE_LOGGING: ${VITE_ENABLE_LOGGING}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID}
    container_name: kai-fusion-frontend
    ports:
      - "23058:3000"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_BASE_PATH: ${VITE_BASE_PATH}
      VITE_API_VERSION: ${VITE_API_VERSION}
      VITE_NODE_ENV: ${VITE_NODE_ENV}
      VITE_ENABLE_LOGGING: ${VITE_ENABLE_LOGGING}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID}
    networks:
      - kai_network
    restart: unless-stopped
    depends_on:
      - kaifusion-be

networks:
  kai_network:
    driver: bridge
